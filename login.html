<!DOCTYPE html>
<html lang="en" style="background:#000;color-scheme:dark;">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lunex · Login</title>
  <script src="security.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;cursor:none!important;}
    html,body{background:#000 !important;}
    body{
      font-family:'Segoe UI',sans-serif;
      background:#000 !important;color:#fff;
      min-height:100vh;display:flex;
      align-items:center;justify-content:center;
      overflow:hidden;cursor:none;
    }
    canvas{position:fixed;inset:0;z-index:0;background:#000 !important;}
    body::after{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
      pointer-events:none;z-index:1;
    }
    #cursor{width:20px;height:20px;border:2px solid #fff;border-radius:50%;position:fixed;pointer-events:none;transform:translate(-50%,-50%);transition:transform .12s,background .2s;z-index:9999;box-shadow:0 0 10px #fff,0 0 20px #fff;}
    #cursor-dot{width:5px;height:5px;background:#fff;border-radius:50%;position:fixed;pointer-events:none;transform:translate(-50%,-50%);z-index:9999;box-shadow:0 0 8px #fff;}

    .container{
      position:relative;z-index:2;
      width:100%;max-width:420px;
      padding:20px;
    }
    .logo{
      text-align:center;margin-bottom:40px;
      font-size:2.5rem;font-weight:900;
      letter-spacing:10px;text-transform:uppercase;
      color:#fff;text-shadow:0 0 10px #fff,0 0 40px rgba(255,255,255,.5);
    animation:flicker 5s 2s infinite;
    /* PAGE TRANSITION */
    }
    @keyframes flicker{
      0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 10px #fff,0 0 40px rgba(255,255,255,.5);}
      20%,24%,55%{text-shadow:none;color:rgba(255,255,255,.7);}
    }

    .card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.12);
      padding:44px 40px;
    }
    .card-title{
      font-size:1rem;font-weight:700;
      letter-spacing:5px;text-transform:uppercase;
      color:rgba(255,255,255,.5);
      margin-bottom:32px;text-align:center;
    }

    /* Tabs */
    .tabs{display:flex;margin-bottom:36px;border-bottom:1px solid rgba(255,255,255,.1);}
    .tab{
      flex:1;padding:12px;text-align:center;
      font-size:.8rem;letter-spacing:4px;text-transform:uppercase;
      color:rgba(255,255,255,.3);cursor:none;
      border-bottom:2px solid transparent;
      transition:color .2s,border-color .2s,text-shadow .2s;
      margin-bottom:-1px;
    }
    .tab.active{
      color:#fff;border-bottom-color:#fff;
      text-shadow:0 0 8px #fff;
    }
    .tab:hover{color:rgba(255,255,255,.7);}

    /* Forms */
    .form{display:none;flex-direction:column;gap:20px;}
    .form.active{display:flex;}

    .field{display:flex;flex-direction:column;gap:8px;}
    .field label{
      font-size:.72rem;letter-spacing:4px;
      text-transform:uppercase;color:rgba(255,255,255,.4);
    }
    .field input{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;padding:14px 16px;
      font-size:.95rem;outline:none;
      transition:border-color .2s,box-shadow .2s;
      cursor:none;
      font-family:inherit;
    }
    .field input:focus{
      border-color:rgba(255,255,255,.6);
      box-shadow:0 0 15px rgba(255,255,255,.1);
    }
    .field input::placeholder{color:rgba(255,255,255,.2);}

    .btn{
      padding:16px;
      font-size:.85rem;font-weight:700;
      letter-spacing:4px;text-transform:uppercase;
      border:2px solid #fff;background:transparent;
      color:#fff;cursor:none;
      transition:background .25s,color .25s,box-shadow .25s;
      box-shadow:0 0 10px rgba(255,255,255,.2);
      font-family:inherit;
      margin-top:6px;
    }
    .btn:hover{
      background:#fff;color:#000;
      box-shadow:0 0 30px #fff,0 0 60px rgba(255,255,255,.4);
    }
    .btn:active{transform:scale(.98);}

    /* Message */
    .msg{
      font-size:.78rem;letter-spacing:2px;
      text-align:center;padding:12px;
      display:none;
    }
    .msg.error{
      border:1px solid rgba(255,80,80,.4);
      background:rgba(255,80,80,.05);
      color:rgba(255,120,120,.9);
      text-shadow:0 0 8px rgba(255,80,80,.5);
    }
    .msg.success{
      border:1px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.04);
      color:#fff;
      text-shadow:0 0 8px #fff;
    }
    .msg.show{display:block;}

    /* Password strength */
    .strength-bar{height:2px;background:rgba(255,255,255,.1);margin-top:6px;}
    .strength-fill{height:100%;width:0;transition:width .3s,background .3s;}

    /* Footer */
    .footer-text{
      text-align:center;margin-top:28px;
      font-size:.7rem;letter-spacing:3px;
      color:rgba(255,255,255,.2);text-transform:uppercase;
    }
    .footer-text a{
      color:rgba(255,255,255,.5);text-decoration:none;
      cursor:none;transition:color .2s;
    }
    .footer-text a:hover{color:#fff;text-shadow:0 0 8px #fff;}

    /* Particles */
    .particle{position:fixed;pointer-events:none;border-radius:50%;z-index:9998;animation:pFly .8s ease-out forwards;}
    @keyframes pFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
    .ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:9997;border:1px solid rgba(255,255,255,.6);animation:rOut .6s ease-out forwards;}
    @keyframes rOut{0%{width:0;height:0;opacity:.8;transform:translate(-50%,-50%);}100%{width:120px;height:120px;opacity:0;transform:translate(-50%,-50%);}}

    /* Show password toggle */
    .field-wrap{position:relative;}
    .toggle-pw{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:rgba(255,255,255,.3);
      cursor:none;font-size:1rem;transition:color .2s;padding:0;
    }
    .toggle-pw:hover{color:#fff;}
    @keyframes slideIn{from{opacity:0;}to{opacity:1;}}
    body.page-enter{animation:slideIn .35s ease both;}
  </style>
</head>
<body style="background:#000;" class="page-enter">
<div id="page-transition" style="position:fixed;inset:0;background:#000;z-index:99999;pointer-events:none;opacity:0;transition:opacity .35s cubic-bezier(.4,0,.2,1);"></div>
<canvas id="starfield"></canvas>
<div id="cursor"></div>
<div id="cursor-dot"></div>

<div class="container">
  <div class="logo">Lunex</div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Username or Email</label>
        <input type="text" id="loginUser" placeholder="Enter username or email" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('loginPass',this)">👁</button>
        </div>
      </div>
      <div class="msg" id="loginMsg"></div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="form" id="registerForm" onsubmit="handleRegister(event)">
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" id="regPass" placeholder="Create a password" oninput="checkStrength(this.value)" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('regPass',this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="field-wrap">
          <input type="password" id="regPass2" placeholder="Repeat password" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('regPass2',this)">👁</button>
        </div>
      </div>
      <div class="msg" id="registerMsg"></div>
      <button class="btn" type="submit">Create Account</button>
    </form>
  </div>

  <div class="footer-text">
    Created by <a href="dashboard.html">Lunex</a> · 2026
  </div>
</div>

<!-- SECRET CODE OVERLAY -->
<div id="secretOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-size:.65rem;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px;">⚡ Superadmin Access</div>
  <div style="font-size:2rem;font-weight:900;letter-spacing:12px;color:#fff;text-shadow:0 0 20px #fff,0 0 60px rgba(255,255,255,.4);animation:flicker 3s infinite;">LUNEX</div>
  <div id="secretDots" style="display:flex;gap:10px;margin:8px 0;">
    <span class="sdot"></span><span class="sdot"></span><span class="sdot"></span><span class="sdot"></span>
  </div>
  <input id="secretInput" type="password" maxlength="4"
    style="background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.3);color:#fff;font-size:1.5rem;letter-spacing:12px;text-align:center;width:120px;outline:none;padding:8px 0;font-family:inherit;cursor:none;"
    placeholder="····" oninput="checkSecret(this.value)" autocomplete="off"/>
  <div id="secretMsg" style="font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,80,80,.7);height:20px;"></div>
  <button onclick="closeSecret()" style="margin-top:8px;background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:3px;text-transform:uppercase;padding:6px 18px;cursor:none;font-family:inherit;transition:all .2s;" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(255,255,255,.5)'" onmouseout="this.style.color='rgba(255,255,255,.3)';this.style.borderColor='rgba(255,255,255,.15)'">Cancel</button>
</div>

<style>
.sdot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.3);transition:all .2s;}
.sdot.filled{background:#fff;border-color:#fff;box-shadow:0 0 8px #fff;}
</style>

<script>
// ── Cursor ──────────────────────────────────────────────
const cursor=document.getElementById('cursor'),cursorDot=document.getElementById('cursor-dot');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursorDot.style.left=mx+'px';cursorDot.style.top=my+'px';});
(function ac(){cx+=(mx-cx)*.15;cy+=(my-cy)*.15;cursor.style.left=cx+'px';cursor.style.top=cy+'px';requestAnimationFrame(ac);})();
document.querySelectorAll('button,input,.tab').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2)';cursor.style.background='rgba(255,255,255,.15)';});
  el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';cursor.style.background='transparent';});
});

// ── Particles ───────────────────────────────────────────
document.addEventListener('click',e=>{spawnRipple(e.clientX,e.clientY);for(let i=0;i<10;i++)spawnParticle(e.clientX,e.clientY);});
function spawnParticle(x,y){const p=document.createElement('div');p.className='particle';const s=Math.random()*7+3,a=Math.random()*Math.PI*2,d=Math.random()*100+30;p.style.cssText=`left:${x}px;top:${y}px;width:${s}px;height:${s}px;background:rgba(255,255,255,${Math.random()*.7+.3});box-shadow:0 0 6px #fff;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`;document.body.appendChild(p);setTimeout(()=>p.remove(),800);}
function spawnRipple(x,y){const r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';document.body.appendChild(r);setTimeout(()=>r.remove(),600);}

// ── Starfield ───────────────────────────────────────────
const canvas=document.getElementById('starfield'),ctx=canvas.getContext('2d');
let stars=[],W,H,mX=0,mY=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;
  // Fill black immediately on every resize to prevent flash
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
}
resize();window.addEventListener('resize',resize);
for(let i=0;i<180;i++)stars.push({x:Math.random()*2000-1000,y:Math.random()*2000-1000,z:Math.random()*1000});
document.addEventListener('mousemove',e=>{mX=(e.clientX/W-.5)*2;mY=(e.clientY/H-.5)*2;});
(function ds(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);stars.forEach(s=>{s.z-=2.5+Math.abs(mX)*1.5;if(s.z<=0){s.z=1000;s.x=Math.random()*2000-1000;s.y=Math.random()*2000-1000;}const sx=(s.x/s.z)*W+W/2+mX*25,sy=(s.y/s.z)*H+H/2+mY*25,r=Math.max(.1,(1-s.z/1000)*2.5),a=1-s.z/1000;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.shadowBlur=r>1.5?5:0;ctx.shadowColor='#fff';ctx.fill();});requestAnimationFrame(ds);})();

// ── Tabs ────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('registerForm').classList.toggle('active',tab==='register');
  clearMsg('loginMsg');clearMsg('registerMsg');
}

// ── Password toggle ─────────────────────────────────────
function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}

// ── Password strength ───────────────────────────────────
function checkStrength(v){
  const fill=document.getElementById('strengthFill');
  let score=0;
  if(v.length>=8)score++;
  if(/[A-Z]/.test(v))score++;
  if(/[0-9]/.test(v))score++;
  if(/[^A-Za-z0-9]/.test(v))score++;
  const pct=[0,25,50,75,100][score];
  const colors=['','rgba(255,80,80,.8)','rgba(255,180,0,.8)','rgba(180,255,0,.8)','rgba(255,255,255,.9)'];
  fill.style.width=pct+'%';
  fill.style.background=colors[score]||'';
  fill.style.boxShadow=score===4?'0 0 8px #fff':'none';
}

// ── Messages ────────────────────────────────────────────
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type+' show';}
function clearMsg(id){const el=document.getElementById(id);el.className='msg';el.textContent='';}

// ── Storage helpers ─────────────────────────────────────
function getUsers(){return JSON.parse(localStorage.getItem('lunex_users')||'[]');}
function saveUsers(u){localStorage.setItem('lunex_users',JSON.stringify(u));}
function setSession(user){localStorage.setItem('lunex_session',JSON.stringify({username:user.username,email:user.email,joined:user.joined}));}

// ── LOGIN ────────────────────────────────────────────────
function handleLogin(e){
  e.preventDefault();
  // Brute-force protection: max 5 attempts per 30s
  if(window.LunexSec){var rl=LunexSec.rateLimit('login_attempt',5,30000);if(!rl.ok){showMsg('loginMsg','Too many attempts. Wait '+Math.ceil(rl.retryIn/1000)+'s.','error');return;}}
  const ident=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!ident||!pass){showMsg('loginMsg','Please fill in all fields.','error');return;}
  const users=getUsers();
  const user=users.find(u=>u.username===ident||u.email===ident);
  if(!user){showMsg('loginMsg','User not found.','error');return;}
  if(user.password!==btoa(pass)){showMsg('loginMsg','Incorrect password.','error');return;}
  showMsg('loginMsg','Welcome back, '+user.username+'!','success');
  setSession(user);
  setTimeout(()=>window.location.href='dashboard.html',1200);
}

// ── REGISTER ─────────────────────────────────────────────
function handleRegister(e){
  e.preventDefault();
  const username=document.getElementById('regUser').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;

  if(!username||!email||!pass||!pass2){showMsg('registerMsg','Please fill in all fields.','error');return;}
  if(username.length<3){showMsg('registerMsg','Username must be at least 3 characters.','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('registerMsg','Invalid email address.','error');return;}
  if(pass.length<6){showMsg('registerMsg','Password must be at least 6 characters.','error');return;}
  if(pass!==pass2){showMsg('registerMsg','Passwords do not match.','error');return;}

  const users=getUsers();
  if(users.find(u=>u.username===username)){showMsg('registerMsg','Username already taken.','error');return;}
  if(users.find(u=>u.email===email)){showMsg('registerMsg','Email already registered.','error');return;}

  const newUser={username,email,password:btoa(pass),joined:new Date().toLocaleDateString()};
  users.push(newUser);
  saveUsers(users);
  showMsg('registerMsg','Account created! Redirecting...','success');
  setSession(newUser);
  setTimeout(()=>window.location.href='dashboard.html',1200);
}

// ── Secret Code ───────────────────────────────────────────
// Triggers: type 1122 anywhere (not in input) OR backtick ` OR click logo 3x
var _sbuf = '';
var _lc = 0, _lt = null;

document.addEventListener('keydown', function(e) {
  if (e.key === '`') { openSecret(); return; }
  var tag = (document.activeElement||{}).tagName||'';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key.length === 1) {
    _sbuf += e.key;
    if (_sbuf.length > 4) _sbuf = _sbuf.slice(-4);
    if (_sbuf === '1122') { _sbuf = ''; openSecret(); }
  }
});

document.querySelector('.logo').addEventListener('click', function() {
  _lc++;
  clearTimeout(_lt);
  _lt = setTimeout(function(){ _lc = 0; }, 700);
  if (_lc >= 3) { _lc = 0; openSecret(); }
});

// Also: click the footer "2026" text
document.addEventListener('DOMContentLoaded', function() {
  var footer = document.querySelector('.footer-text');
  if (footer) footer.addEventListener('click', function() { openSecret(); });
});

function openSecret() {
  var o = document.getElementById('secretOverlay');
  o.style.display = 'flex';
  document.getElementById('secretInput').value = '';
  document.getElementById('secretMsg').textContent = '';
  updateDots(0);
  setTimeout(function() { document.getElementById('secretInput').focus(); }, 100);
}
function closeSecret() {
  document.getElementById('secretOverlay').style.display = 'none';
  document.getElementById('secretInput').value = '';
  document.getElementById('secretMsg').textContent = '';
  updateDots(0);
}
function updateDots(n) {
  document.querySelectorAll('.sdot').forEach(function(d, i) { d.classList.toggle('filled', i < n); });
}
function checkSecret(val) {
  updateDots(val.length);
  if (val.length < 4) { document.getElementById('secretMsg').textContent = ''; return; }
  if (val === '1122') {
    var assign = JSON.parse(localStorage.getItem('lunex_assign') || '{}');
    assign['qqq'] = 'superadmin';
    localStorage.setItem('lunex_assign', JSON.stringify(assign));
    var roles2 = JSON.parse(localStorage.getItem('lunex_roles2') || 'null') || [];
    if (!roles2.find(function(r){return r.id==='superadmin';})) {
      roles2.unshift({id:'superadmin',name:'Superadmin',color:'#fff',perms:{administrator:true},protected:true,position:100});
      localStorage.setItem('lunex_roles2', JSON.stringify(roles2));
    }
    var msg = document.getElementById('secretMsg');
    msg.style.color = '#fff'; msg.style.textShadow = '0 0 10px #fff';
    msg.textContent = '✦ ACCESS GRANTED';
    for (var i = 0; i < 60; i++) {
      (function(){
        var p = document.createElement('div'); p.className = 'particle';
        var x = window.innerWidth/2, y = window.innerHeight/2;
        var s = Math.random()*8+3, a = Math.random()*Math.PI*2, d = Math.random()*200+60;
        p.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+s+'px;height:'+s+'px;background:rgba(255,255,255,'+(Math.random()*.8+.2)+');box-shadow:0 0 8px #fff;--tx:'+(Math.cos(a)*d)+'px;--ty:'+(Math.sin(a)*d)+'px;z-index:99999;position:fixed;pointer-events:none;border-radius:50%;animation:pFly .9s ease-out forwards;';
        document.body.appendChild(p); setTimeout(function(){p.remove();}, 900);
      })();
    }
    setTimeout(function() {
      sessionStorage.setItem('lunex_root_unlocked','1');
      window.location.href = 'secret.html';
    }, 1400);
  } else {
    var msg = document.getElementById('secretMsg');
    msg.style.color = 'rgba(255,80,80,.8)'; msg.style.textShadow = 'none';
    msg.textContent = '✕ Wrong code';
    document.getElementById('secretInput').value = '';
    updateDots(0);
    var inp = document.getElementById('secretInput');
    var shakes = ['-8px','8px','-6px','6px','-3px','0'];
    shakes.forEach(function(v, i) { setTimeout(function(){ inp.style.transform='translateX('+v+')'; }, i*50); });
  }
}
document.getElementById('secretOverlay').addEventListener('click', function(e) { if(e.target===this) closeSecret(); });

</script>
<script src="transition.js"></script>
</body>
</html>
